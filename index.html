<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Native - 智能事务管理</title>
    <link href="https://static.mastergo.com/static/ai/resource/html/googleapis/css2" rel="stylesheet">
    <script src="https://static.mastergo.com/static/ai/resource/html/tailwind/tailwind.js"></script>
    <script>tailwind.config={theme:{extend:{colors:{primary:'#3B82F6',secondary:'#8B5CF6'},borderRadius:{'none':'0px','sm':'2px',DEFAULT:'4px','md':'8px','lg':'12px','xl':'16px','2xl':'20px','3xl':'24px','full':'9999px','button':'4px'}}}}</script>
    <link rel="stylesheet" href="https://static.mastergo.com/static/ai/resource/html/font-awesome/css/all.min.css">
    <style>
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 16px;
            height: 44px;
            background-color: white;
            font-size: 14px;
            color: #000;
        }
        .nav-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px;
            height: 64px;
            background-color: white;
            border-bottom: 1px solid #f0f0f0;
        }
        .main-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 24px;
            min-height: calc(100vh - 152px);
            background-color: white;
        }
        .mic-container {
            position: relative;
            width: 120px;
            height: 120px;
            margin-bottom: 32px;
        }
        .mic-circle {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .mic-wave {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 2px solid #EDE9FE;
        }
        .mic-center {
            background-color: #3B82F6;
            z-index: 10;
        }
        .mic-wave:nth-child(2) {
            animation: wave1 2s infinite ease-out;
            opacity: 0.6;
        }
        .mic-wave:nth-child(3) {
            animation: wave2 2s infinite ease-out 0.3s;
            opacity: 0.4;
        }
        .mic-wave:nth-child(4) {
            animation: wave3 2s infinite ease-out 0.6s;
            opacity: 0.2;
        }
        @keyframes wave1 {
            0% { transform: scale(1); opacity: 0.6; }
            100% { transform: scale(1.8); opacity: 0; }
        }
        @keyframes wave2 {
            0% { transform: scale(1); opacity: 0.4; }
            100% { transform: scale(1.8); opacity: 0; }
        }
        @keyframes wave3 {
            0% { transform: scale(1); opacity: 0.2; }
            100% { transform: scale(1.8); opacity: 0; }
        }
        .input-area {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 16px;
            background-color: white;
            border-top: 1px solid #f0f0f0;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .input-box {
            flex: 1;
            padding: 12px 16px;
            background-color: #F9FAFB;
            border-radius: 24px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .input-text {
            flex: 1;
            outline: none;
            border: none;
            background: transparent;
            font-size: 16px;
            color: #6B7280;
        }
        .menu-icon, .user-icon {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #F3F4F6;
        }
        .user-icon img {
            width: 20px;
            height: 20px;
            border-radius: 50%;
        }
        .hint-text {
            text-align: center;
            max-width: 300px;
        }
        .hint-title {
            font-size: 20px;
            font-weight: 600;
            color: #1F2937;
            margin-bottom: 8px;
        }
        .hint-subtitle {
            font-size: 14px;
            color: #6B7280;
            line-height: 1.5;
        }
    </style>
</head>
<body class="bg-white" style="width: 375px; min-height: 762px; margin: 0 auto; position: relative;">
    <div class="status-bar">
        <span>9:41</span>
        <div class="flex items-center gap-2">
            <i class="fas fa-signal text-xs" style="width: 16px; height: 16px; display: flex; justify-content: center; align-items: center;"></i>
            <i class="fas fa-wifi text-xs" style="width: 16px; height: 16px; display: flex; justify-content: center; align-items: center;"></i>
            <i class="fas fa-battery-three-quarters text-xs" style="width: 16px; height: 16px; display: flex; justify-content: center; align-items: center;"></i>
        </div>
    </div>
    
    <div class="nav-bar">
        <div class="menu-icon">
            <i class="fas fa-bars text-sm" style="width: 16px; height: 16px; display: flex; justify-content: center; align-items: center;"></i>
        </div>
        <h1 class="text-lg font-semibold text-gray-900">AI Native</h1>
        <div class="user-icon">
            <img src="D:\Project\AI_Native\docs\img\4092564-about-mobile-ui-profile-ui-user-website_114033.png" width=20px height = 20px alt="User">
        </div>
    </div>
    
    <div class="main-content">
        <div class="mic-container">
            <div class="mic-circle mic-wave"></div>
            <div class="mic-circle mic-wave"></div>
            <div class="mic-circle mic-wave"></div>
            <div class="mic-circle mic-center">
                <i class="fas fa-microphone text-white text-xl" style="width: 24px; height: 24px; display: flex; justify-content: center; align-items: center;"></i>
            </div>
        </div>
        
        <div class="hint-text">
            <div class="hint-title">今天想记录什么？</div>
            <div class="hint-subtitle">例如：午饭 35 元，明天下午 3 点开会，提醒我交电费</div>
        </div>
    </div>
    
    <div class="input-area">
        <div class="input-box">
            <i class="fas fa-microphone text-purple-500 text-sm" style="width: 20px; height: 20px; display: flex; justify-content: center; align-items: center;"></i>
            <input type="text" class="input-text" placeholder="说点什么吧...">
            <i class="fas fa-keyboard text-gray-400 text-sm" style="width: 20px; height: 20px; display: flex; justify-content: center; align-items: center;"></i>
        </div>
    </div>
</body>
</html>
